<div class="px-4 py-8 lg:px-8 max-w-4xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Manage Faculty</h1>
    <p class="mt-2 text-sm text-slate-500">Create new faculty accounts and assign them to committees.</p>
  </div>

  <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h2 class="text-xl font-semibold text-slate-800 mb-6 border-b border-slate-100 pb-4">Create New Faculty</h2>
    
    <form [formGroup]="facultyForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Full Name</label>
          <input formControlName="name" placeholder="Dr. John Doe" class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
          <p *ngIf="facultyForm.get('name')?.invalid && facultyForm.get('name')?.touched" class="mt-1 text-xs text-red-500">Name is required</p>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Email Address</label>
          <input type="email" formControlName="email" placeholder="john.doe@college.edu" class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
          <p *ngIf="facultyForm.get('email')?.invalid && facultyForm.get('email')?.touched" class="mt-1 text-xs text-red-500">Valid email is required</p>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Password</label>
          <input type="password" formControlName="password" placeholder="Secure password" class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
          <p *ngIf="facultyForm.get('password')?.invalid && facultyForm.get('password')?.touched" class="mt-1 text-xs text-red-500">Password must be at least 6 characters</p>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Assign Committee (Optional)</label>
          <select formControlName="committeeId" class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all">
            <option [ngValue]="null">Select a Committee</option>
            <option *ngFor="let committee of committees" [value]="committee.id">{{ committee.committeeName }}</option>
          </select>
        </div>
      </div>

      <div class="flex justify-end pt-4 border-t border-slate-100">
        <button type="submit" [disabled]="submitting" class="rounded-xl bg-blue-600 px-6 py-2.5 text-sm font-semibold text-white shadow hover:bg-blue-700 hover:shadow-lg transition-all disabled:opacity-50">
          {{ submitting ? 'Creating...' : 'Create Faculty Account' }}
        </button>
      </div>
    </form>
  </div>
</div>
